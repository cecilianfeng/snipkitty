name: Deploy Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy send-renewal-reminders function
        run: |
          supabase functions deploy send-renewal-reminders \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --no-verify
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy send-trial-warnings function
        run: |
          supabase functions deploy send-trial-warnings \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --no-verify
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy send-weekly-digest function
        run: |
          supabase functions deploy send-weekly-digest \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --no-verify
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy notify-price-change function
        run: |
          supabase functions deploy notify-price-change \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --no-verify
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deployment Summary
        if: success()
        run: |
          echo "✅ All Edge Functions deployed successfully"
          echo "- send-renewal-reminders"
          echo "- send-trial-warnings"
          echo "- send-weekly-digest"
          echo "- notify-price-change"
